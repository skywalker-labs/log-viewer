name: Bug Report
description: Report a bug to help us improve LogViewer
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: LogViewer Version
      description: What version of LogViewer are you using?
      placeholder: v1.2.0
    validations:
      required: true
  - type: input
    id: laravel_version
    attributes:
      label: Laravel Version
      description: What version of Laravel are you using?
      placeholder: v12.x
    validations:
      required: true
  - type: input
    id: php_version
    attributes:
      label: PHP Version
      description: What version of PHP are you using?
      placeholder: 8.4
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (e.g., specific log channel configuration).
