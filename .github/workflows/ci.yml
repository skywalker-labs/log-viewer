name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        php: [7.4, 8.0, 8.1, 8.2, 8.3, 8.4, 8.5]
        laravel: [6.*, 7.*, 8.*, 9.*, 10.*, 11.*, 12.*, 13.*]
        stability: [prefer-stable]
        include:
          - laravel: 6.*
            testbench: 4.*
          - laravel: 7.*
            testbench: 5.*
          - laravel: 8.*
            testbench: 6.*
          - laravel: 9.*
            testbench: 7.*
          - laravel: 10.*
            testbench: 8.*
          - laravel: 11.*
            testbench: 9.*
          - laravel: 12.*
            testbench: 10.*
          - laravel: 13.*
            testbench: 11.*
        exclude:
          - php: 7.4
            laravel: 9.*
          - php: 7.4
            laravel: 10.*
          - php: 7.4
            laravel: 11.*
          - php: 7.4
            laravel: 12.*
          - php: 7.4
            laravel: 13.*
          - php: 8.0
            laravel: 10.*
          - php: 8.0
            laravel: 11.*
          - php: 8.0
            laravel: 12.*
          - php: 8.0
            laravel: 13.*
          - php: 8.1
            laravel: 11.*
          - php: 8.1
            laravel: 12.*
          - php: 8.1
            laravel: 13.*

    name: P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.stability }} - ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: |
          # Globally disable security audit blocking
          composer config audit.block-insecure false || true
          
          # Dynamically adjust dev dependencies for older PHP versions
          if [ "$(php -r 'echo (PHP_VERSION_ID < 80000) ? 1 : 0;')" == "1" ]; then
            composer remove --dev laravel/pint --no-update --no-interaction --no-audit
          fi
          
          if [ "$(php -r 'echo (PHP_VERSION_ID < 80200) ? 1 : 0;')" == "1" ]; then
            composer remove --dev phpstan/phpstan --no-update --no-interaction --no-audit
          fi

          # Update core requirements directly in composer.json
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update --dev --no-audit
          
          # Perform the update with security audit bypassed
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction --no-audit

      - name: Execute tests
        run: vendor/bin/phpunit --colors=always

      - name: Static Analysis
        if: matrix.php >= 8.2
        run: vendor/bin/phpstan analyse src --level 9
