name: main

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Laravel 12
          - laravel: 12.*
            php: 8.5
            testbench: 10.*
            phpunit: ^11.0
          - laravel: 12.*
            php: 8.4
            testbench: 10.*
            phpunit: ^11.0
          - laravel: 12.*
            php: 8.4
            testbench: 10.*
            phpunit: ^11.0
            dependency-version: prefer-lowest
          - laravel: 12.*
            php: 8.3
            testbench: 10.*
            phpunit: ^11.0
          - laravel: 12.*
            php: 8.2
            testbench: 10.*
            phpunit: ^11.0

          # Laravel 11
          - laravel: 11.*
            php: 8.5
            testbench: 9.*
            phpunit: ^11.0
          - laravel: 11.*
            php: 8.4
            testbench: 9.*
            phpunit: ^11.0
          - laravel: 11.*
            php: 8.3
            testbench: 9.*
            phpunit: ^11.0
          - laravel: 11.*
            php: 8.2
            testbench: 9.*
            phpunit: ^11.0

          # Laravel 10
          - laravel: 10.*
            php: 8.3
            testbench: 8.*
            phpunit: ^10.0
          - laravel: 10.*
            php: 8.2
            testbench: 8.*
            phpunit: ^10.0
          - laravel: 10.*
            php: 8.1
            testbench: 8.*
            phpunit: ^10.0

          # Laravel 9
          - laravel: 9.*
            php: 8.2
            testbench: 7.*
            phpunit: ^9.3
          - laravel: 9.*
            php: 8.1
            testbench: 7.*
            phpunit: ^9.3
          - laravel: 9.*
            php: 8.0
            testbench: 7.*
            phpunit: ^9.3

          # Laravel 8
          - laravel: 8.*
            php: 8.1
            testbench: 6.*
            phpunit: ^9.3
          - laravel: 8.*
            php: 8.0
            testbench: 6.*
            phpunit: ^9.3
          - laravel: 8.*
            php: 7.4
            testbench: 6.*
            phpunit: ^9.3

    name: P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.dependency-version || 'prefer-stable' }} - ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: |
          composer config allow-plugins.kylekatarnls/update-helper true
          composer config audit.block-insecure false || true
          
          # Pint requires PHP 8.1+
          if [ "$(php -r 'echo (PHP_VERSION_ID < 80100) ? 1 : 0;')" == "1" ]; then
            composer remove --dev laravel/pint --no-update --no-interaction --no-audit
          fi
          
          # PHPStan requires PHP 8.2+ for our current constraints
          if [ "$(php -r 'echo (PHP_VERSION_ID < 80200) ? 1 : 0;')" == "1" ]; then
            composer remove --dev phpstan/phpstan --no-update --no-interaction --no-audit
          fi

          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" "phpunit/phpunit:${{ matrix.phpunit }}" --no-interaction --no-update --dev -W --no-audit
          composer update --${{ matrix.dependency-version || 'prefer-stable' }} --prefer-dist --no-interaction --no-audit

      - name: Execute tests
        run: vendor/bin/phpunit --colors=always

      - name: Static Analysis
        if: matrix.php >= 8.2
        run: vendor/bin/phpstan analyse src --level 9
